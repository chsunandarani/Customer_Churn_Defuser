<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Customer Churn Defuser</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="text-center mb-4">
        <i class="fa-solid fa-shield-halved fa-2x" style="color: var(--primary-blue);"></i>
        <h2 class="mt-2">Churn Defuser</h2>
        <p class="text-muted">AI-Powered Customer Retention System</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" name="username" placeholder="admin" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100">
          <i class="fa-solid fa-right-to-bracket"></i> Sign In
        </button>
      </form>
      <p class="text-center text-muted mt-3" style="font-size: 0.85rem;">
        Demo mode — any username / password will work.
      </p>
    </div>
  </div>
</body>
</html>
